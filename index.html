<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DR</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <img src="images/CatDancing.gif" alt="Cat" class="wanthug" id="cat-image">
        <h1 id="title">У тебя сегодня День Рождения?</h1>
        
        <!-- Контейнер кнопок: он должен быть relative, чтобы кнопки убегали внутри него или рядом -->
        <div class="buttons-wrapper" id="buttons-wrapper">
            <button id="no-btn" class="btn-no">Нет</button>
            <button id="yes-btn" class="btn-yes">Да</button>
        </div>

        <div id="next-stage" style="display: none;">
            <button id="next-btn" class="btn-next">Далее 🎁</button>
        </div>

        <div id="wheel-container" style="display: none;">
            <div class="wheel-wrapper">
                <div class="arrow">▼</div>
                <div class="wheel" id="wheel">
                    <div class="sector sector-1"><span>1</span></div>
                    <div class="sector sector-2"><span>2</span></div>
                    <div class="sector sector-3"><span>3</span></div>
                    <div class="sector sector-4"><span>4</span></div>
                </div>
            </div>
            <button id="spin-btn" class="btn-spin">Крутить! 🎡</button>
            <div id="result" class="result"></div>
        </div>

        <div id="congrats-screen" style="display: none;">
            <img src="images/CatDancing.gif" class="congrats-img" id="congrats-img">
            <h2 id="congrats-text">С Днём Рождения! 🎂</h2>
            <button id="return-btn" class="btn-return">Вернуться к колесу</button>
        </div>
            <!-- === ЭКРАН С ТОРТОМ === -->
    <div id="cake-screen" style="display: none;">
        <div id="cake-scene">
            <h2 id="counter">Осталось кусочков: 8</h2>
            <p class="hint">🖱️ Крути мышкой · 🖱️ Кликай по куску торта</p>
        </div>
        <div id="win-screen" class="hidden">
            <img src="https://media.giphy.com/media/3o6ZsZdNs3yE5l6hWM/giphy.gif" alt="yummy">
            <h1>Весь торт схавала! 😋</h1>
            <p>Ты настоящий сладкоежка! 🍰✨</p>
            <button id="back-to-wheel-btn" class="btn-return">Вернуться к колесу 🎡</button>
        </div>
    </div>

    <!-- Подключаем Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    
    <!-- Твой скрипт -->
    <script src="script.js"></script>
</body>
</html>
