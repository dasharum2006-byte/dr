<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DR</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <img src="images/CatDancing.gif" alt="Cat" class="wanthug">
        <h1 id="title">У тебя сегодня День Рождения?</h1>
        
        <div class="buttons" id="buttons">
            <button id="no-btn" class="btn-no">Нет</button>
            <button id="yes-btn" class="btn-yes">Да</button>
        </div>

        <div id="next-stage" class="hidden">
            <button id="next-btn" class="btn-next">Далее</button>
        </div>

        <div id="wheel-container" class="hidden">
            <div class="wheel-wrapper">
                <div class="arrow">▼</div>
                <div class="wheel" id="wheel">
                    <div class="sector sector-1"><span>1</span></div>
                    <div class="sector sector-2"><span>2</span></div>
                    <div class="sector sector-3"><span>3</span></div>
                    <div class="sector sector-4"><span>4</span></div>
                </div>
            </div>
            <button id="spin-btn" class="btn-spin">Крути</button>
            <div id="result" class="result"></div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
